# ──────────────────────────────────────────────────────────────────
# Ninco — Production Deployment Workflow
# Triggered when code is merged into the `main` branch.
# SSHs into the production server, pulls latest code, rebuilds
# Docker containers, applies database migrations, and restarts.
# ──────────────────────────────────────────────────────────────────

name: Deploy to Production

on:
  push:
    branches:
      - main

# Only allow one deployment at a time — cancel in-progress runs
concurrency:
  group: production-deploy
  cancel-in-progress: true

# Minimal permissions — this workflow only needs to read the repo
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          # Write the private key and fix any Windows line endings
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "
            set -e
            echo '📂 Navigating to project directory...'
            cd ${{ secrets.PROJECT_PATH }}
            
            echo '⬇️ Syncing repository...'
            git fetch origin main
            git reset --hard origin/main
            
            echo '🔨 Building Docker containers...'
            docker compose --profile prod build
            
            echo '🚀 Starting updated containers...'
            docker compose --profile prod up -d --remove-orphans
            
            echo '🗄️ Applying database migrations...'
            docker compose --profile prod exec -T ninco-backend npx prisma migrate deploy
            
            echo '🩺 Running health check...'
            curl -f http://localhost:3344/health
            
            echo '🧹 Cleaning up old Docker resources...'
            docker image prune -f
            docker container prune -f
            
            echo '✅ Deployment complete!'
          "
